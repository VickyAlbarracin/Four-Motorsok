<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Four Motors — BS AS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background:#0a0a09; color:#f2f1ee;
    font-family:'DM Sans', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection { background:rgba(201,168,106,0.25); }
  img { max-width:100%; display:block; }
  a { color:inherit; }

  @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:.8} }
  @keyframes fadeUp { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
  .reveal { opacity:0; animation:fadeUp 0.8s ease forwards; }

  #main-nav.scrolled {
    background:rgba(10,10,9,0.93) !important;
    border-bottom-color:rgba(255,255,255,0.07) !important;
    backdrop-filter:blur(20px) !important;
    -webkit-backdrop-filter:blur(20px) !important;
  }

  .btn-light, .btn-outline, .btn-gold {
    display:inline-flex; align-items:center; gap:8px;
    padding:15px 30px; border-radius:100px;
    font-size:14px; font-weight:700; text-decoration:none;
    transition: all .22s; cursor:pointer; border:none;
  }
  .btn-light { background:#f2f1ee; color:#0a0a09; }
  .btn-light:hover { background:#c9a86a; }
  .btn-outline { border:1px solid rgba(242,241,238,0.18); color:#f2f1ee; background:transparent; }
  .btn-outline:hover { border-color:rgba(201,168,106,0.65); color:#c9a86a; }
  .btn-gold { background:#c9a86a; color:#0a0a09; }
  .btn-gold:hover { background:#f2f1ee; }

  .eyebrow {
    display:inline-flex; align-items:center; gap:10px;
    font-size:11px; letter-spacing:3.5px; text-transform:uppercase;
    color:#c9a86a; font-weight:600; margin-bottom:20px;
  }
  .eyebrow .line { width:22px; height:1px; background:#c9a86a; }

  section { padding:100px 24px; border-top:1px solid rgba(255,255,255,0.055); }

  @media(max-width:900px){
    .nav-links{display:none !important}
    .nav-mob{display:flex !important}
    .contact-grid{grid-template-columns:1fr !important}
    .services-grid{grid-template-columns:repeat(2,1fr) !important}
    .insp-grid{grid-template-columns:1fr !important}
    .stats-grid{grid-template-columns:repeat(3,1fr) !important}
  }
  @media(max-width:600px){
    .hero-h1{font-size:60px !important; letter-spacing:-2px !important}
    .services-grid{grid-template-columns:1fr !important}
    .stock-grid{grid-template-columns:1fr !important}
    .stats-grid{grid-template-columns:1fr !important}
    .insp-checks{grid-template-columns:1fr !important}
    #mob-bar{display:flex !important}
    section{padding:70px 20px}
  }

  .loading-msg {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:#0a0a09; color:rgba(242,241,238,0.4); font-size:14px; z-index:9999;
    transition:opacity .4s ease;
  }
</style>
</head>
<body>

<div class="loading-msg" id="loading-msg">Cargando…</div>

<!-- ═══ NAV ═══ -->
<nav id="main-nav" style="position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:transparent;border-bottom:1px solid transparent;transition:background .35s,border-color .35s,backdrop-filter .35s;">

  <a href="#inicio" style="text-decoration:none;flex-shrink:0;">
    <svg width="42" height="42" viewBox="0 0 42 42" fill="none" aria-label="Four Motors">

      <text x="21" y="20" text-anchor="middle" fill="#0a0a09" font-family="DM Sans,system-ui" font-size="11.5" font-weight="800" dominant-baseline="middle">four.</text>
      <text x="21" y="28" text-anchor="middle" fill="#0a0a09" font-family="DM Sans,system-ui" font-size="3.8" font-weight="600" letter-spacing="2.2">MOTORS</text>
      <text x="21" y="33" text-anchor="middle" fill="rgba(10,10,9,0.42)" font-family="DM Sans,system-ui" font-size="3" letter-spacing="1.5">BS AS</text>
    </svg>
  </a>

  <div class="nav-links" style="display:flex;align-items:center;gap:2px;">
    <a href="#nosotros" class="nav-link" style="color:rgba(242,241,238,0.58);font-size:14px;font-weight:500;text-decoration:none;padding:8px 14px;transition:color .2s;">Nosotros</a>
    <a href="#servicios" class="nav-link" style="color:rgba(242,241,238,0.58);font-size:14px;font-weight:500;text-decoration:none;padding:8px 14px;transition:color .2s;">Servicios</a>
    <a href="#inspeccion" class="nav-link" style="color:rgba(242,241,238,0.58);font-size:14px;font-weight:500;text-decoration:none;padding:8px 14px;transition:color .2s;">Inspección</a>
    <a href="#stock" class="nav-link" style="color:rgba(242,241,238,0.58);font-size:14px;font-weight:500;text-decoration:none;padding:8px 14px;transition:color .2s;">Stock</a>
    <a href="#contacto" class="nav-link" style="color:rgba(242,241,238,0.58);font-size:14px;font-weight:500;text-decoration:none;padding:8px 14px;transition:color .2s;">Contacto</a>
    <div style="width:1px;height:18px;background:rgba(255,255,255,0.1);margin:0 8px;"></div>
    <a href="#" id="ig-link-nav" target="_blank" rel="noopener" aria-label="Instagram" style="display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);color:#f2f1ee;transition:all .2s;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle></svg>
    </a>
    <a href="#" id="wa-link-nav" target="_blank" rel="noopener" class="btn-light" style="padding:10px 20px;font-size:13px;margin-left:6px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"></path></svg>
      WhatsApp
    </a>
  </div>

  <a class="nav-mob" href="#" id="wa-link-mob-nav" target="_blank" rel="noopener" style="display:none;align-items:center;gap:6px;padding:9px 16px;background:#f2f1ee;color:#0a0a09;border-radius:100px;font-size:13px;font-weight:700;text-decoration:none;">
    WA
  </a>
</nav>


<!-- ═══ HERO ═══ -->
<section id="inicio" style="position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;background:#0a0a09;border-top:none;padding:0;">
  <div id="hero-slide-a" style="position:absolute;inset:0;background-size:cover;background-position:50% 30%;opacity:1;transition:opacity 1.8s ease;"></div>
  <div id="hero-slide-b" style="position:absolute;inset:0;background-size:cover;background-position:50% 30%;opacity:0;transition:opacity 1.8s ease;"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(108deg,rgba(10,10,9,0.97) 0%,rgba(10,10,9,0.90) 40%,rgba(10,10,9,0.55) 68%,rgba(10,10,9,0.2) 100%);z-index:1;"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,9,0.7) 0%,transparent 40%);z-index:1;"></div>

  <div style="position:relative;z-index:2;padding:130px 6% 80px;max-width:680px;width:100%;">
    <div class="eyebrow reveal" id="hero-eyebrow" style="animation-delay:.05s"></div>

    <h1 class="hero-h1 reveal" id="hero-titulo" style="animation-delay:.1s;font-size:clamp(64px,10.5vw,118px);font-weight:900;line-height:0.88;letter-spacing:-3px;margin-bottom:10px;"></h1>

    <div class="reveal" id="hero-subtitulo" style="animation-delay:.15s;font-size:12px;letter-spacing:7px;text-transform:uppercase;color:rgba(242,241,238,0.36);font-weight:500;margin-bottom:34px;"></div>

    <p class="reveal" id="hero-texto" style="animation-delay:.2s;max-width:440px;font-size:17px;line-height:1.72;color:rgba(242,241,238,0.7);margin-bottom:44px;"></p>

    <div class="reveal" style="animation-delay:.25s;display:flex;gap:12px;flex-wrap:wrap;">
      <a href="#servicios" class="btn-light" id="hero-btn-principal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"></path></svg>
      </a>
      <a href="#" id="hero-btn-secundario" target="_blank" rel="noopener" class="btn-outline"></a>
    </div>
  </div>

  <div style="position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;opacity:.6;">
    <span style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(242,241,238,0.5);">scroll</span>
    <div style="width:1px;height:36px;background:linear-gradient(to bottom,rgba(201,168,106,0.8),transparent);animation:pulse 2.2s ease-in-out infinite;"></div>
  </div>
</section>


<!-- ═══ NOSOTROS ═══ -->
<section id="nosotros" style="border-top:none;">
  <div style="max-width:900px;margin:0 auto;text-align:center;">
    <div class="eyebrow" id="nosotros-eyebrow-wrap" style="justify-content:center;width:100%;">
      <span class="line"></span>
      <span id="nosotros-eyebrow"></span>
      <span class="line"></span>
    </div>

    <h2 id="nosotros-titulo" style="font-size:clamp(26px,4.5vw,46px);font-weight:700;line-height:1.25;letter-spacing:-.5px;max-width:680px;margin:0 auto 20px;"></h2>

    <p id="nosotros-texto" style="font-size:17px;line-height:1.72;color:rgba(242,241,238,0.55);max-width:520px;margin:0 auto 68px;"></p>

    <div class="stats-grid" id="stats-grid" style="display:grid;grid-template-columns:repeat(3,1fr);border:1px solid rgba(255,255,255,0.07);border-radius:18px;overflow:hidden;"></div>
  </div>
</section>


<!-- ═══ SERVICIOS ═══ -->
<section id="servicios">
  <div style="max-width:1160px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:52px;">
      <div>
        <div class="eyebrow" id="servicios-eyebrow"></div>
        <h2 id="servicios-titulo" style="font-size:clamp(26px,4vw,40px);font-weight:700;letter-spacing:-.5px;line-height:1.2;"></h2>
      </div>
      <p id="servicios-texto" style="font-size:14px;color:rgba(242,241,238,0.4);max-width:260px;line-height:1.65;"></p>
    </div>

    <div class="services-grid" id="servicios-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;"></div>
  </div>
</section>


<!-- ═══ INSPECCIÓN ═══ -->

        <div style="background:#111110;border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:36px 32px;">
          <div id="insp-checklist-titulo" style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#c9a86a;font-weight:600;margin-bottom:24px;"></div>
          <div class="insp-checks" id="insp-checklist" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>
          <div style="margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(242,241,238,0.35)" stroke-width="1.6" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>

          </div>
        </div>
      </div>

    </div>
  </div>
</section>


<!-- ═══ STOCK ═══ -->
<section id="stock">
  <div style="max-width:1160px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:48px;">
      <div>
        <div class="eyebrow" id="stock-eyebrow"></div>
        <h2 id="stock-titulo" style="font-size:clamp(26px,4vw,40px);font-weight:700;letter-spacing:-.5px;"></h2>

      <a href="#" id="stock-boton-ver-todo" target="_blank" rel="noopener" class="btn-outline" style="padding:11px 22px;font-size:13px;"></a>

    <div class="stock-grid" id="stock-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;"></div>
  </div>
</section>


<!-- ═══ CONTACTO ═══ -->
<section id="contacto">

            </div>

              <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(242,241,238,0.35);margin-bottom:3px;font-weight:500;">WhatsApp</div>
              <div id="contacto-wa-numero" style="font-size:15px;font-weight:600;"></div>
            </div>

<script>
const ICONS = {
  search: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a86a" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>',
  'trending-up': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a86a" stroke-width="1.8" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>',
  swap: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a86a" stroke-width="1.8" stroke-linecap="round"><path d="M7 16V4m0 0L3 8m4-4 4 4"></path><path d="M17 8v12m0 0 4-4m-4 4-4-4"></path></svg>',
  shield: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a86a" stroke-width="1.8" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>',
  'credit-card': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a86a" stroke-width="1.8" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>'
};

const WA_ICON_SMALL = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"></path></svg>';

function waLink(numero, mensaje) {
  const base = 'https://wa.me/' + numero;
  return mensaje ? base + '?text=' + encodeURIComponent(mensaje) : base;
}

async function loadJSON(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error('No se pudo cargar ' + path);
  return res.json();
}

async function init() {
  const [content, heroImages, stock] = await Promise.all([
    loadJSON('data/content.json'),
    loadJSON('data/hero-images.json'),
    loadJSON('data/stock.json')
  ]);

  // ---------- NAV scroll ----------
  const nav = document.getElementById('main-nav');
  const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 60);
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  document.querySelectorAll('.nav-link').forEach(a => {
    a.addEventListener('mouseover', () => a.style.color = '#f2f1ee');
    a.addEventListener('mouseout', () => a.style.color = 'rgba(242,241,238,0.58)');
  });

  // ---------- WhatsApp / Instagram / Mapa global links ----------
  const waNumero = content.contacto.whatsapp.numero_link;
  const igUrl = content.contacto.instagram.url;
  const mapaSearchUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(content.contacto.ubicacion.query_mapa.replace(/\+/g,' '));

  document.getElementById('wa-link-nav').href = waLink(waNumero);
  document.getElementById('wa-link-mob-nav').href = waLink(waNumero);
  document.getElementById('ig-link-nav').href = igUrl;
  document.getElementById('mob-bar-wa').href = waLink(waNumero);
  document.getElementById('mob-bar-ig').href = igUrl;
  document.getElementById('footer-wa').href = waLink(waNumero);
  document.getElementById('footer-ig').href = igUrl;
  document.getElementById('footer-mapa').href = mapaSearchUrl;

  document.querySelectorAll('#footer-wa,#footer-ig,#footer-mapa').forEach(a=>{
    a.addEventListener('mouseover', ()=> a.style.color = '#c9a86a');
    a.addEventListener('mouseout', ()=> a.style.color = 'rgba(242,241,238,0.2)');
  });

  // ---------- HERO ----------
  document.getElementById('hero-eyebrow').innerHTML =
    '<span class="line"></span><span>' + content.hero.eyebrow + '</span>';
  document.getElementById('hero-titulo').innerHTML =
    content.hero.titulo.replace('.', '<span style="color:#c9a86a;">.</span>');
  document.getElementById('hero-subtitulo').textContent = content.hero.subtitulo;
  document.getElementById('hero-texto').textContent = content.hero.texto;

  const btnP = document.getElementById('hero-btn-principal');
  btnP.innerHTML = content.hero.boton_principal + ' ' + btnP.innerHTML;
  const btnS = document.getElementById('hero-btn-secundario');
  btnS.textContent = content.hero.boton_secundario;
  btnS.href = waLink(waNumero);

  // hero slider
  const a = document.getElementById('hero-slide-a');
  const b = document.getElementById('hero-slide-b');
  const slides = heroImages.length ? heroImages : ['images/hero-1.jpg'];
  let idx = 0, showA = true;
  const setSlide = (el, src) => { el.style.backgroundImage = "url('" + src + "')"; };
  setSlide(a, slides[0]);
  if (slides.length > 1) setSlide(b, slides[1]);
  if (slides.length > 1) {
    setInterval(() => {
      idx = (idx + 1) % slides.length;
      if (showA) { setSlide(b, slides[idx]); a.style.opacity='0'; b.style.opacity='1'; }
      else { setSlide(a, slides[idx]); b.style.opacity='0'; a.style.opacity='1'; }
      showA = !showA;
    }, 6000);
  }

  // ---------- NOSOTROS ----------
  document.getElementById('nosotros-eyebrow').textContent = content.nosotros.eyebrow;
  document.getElementById('nosotros-titulo').textContent = content.nosotros.titulo;
  document.getElementById('nosotros-texto').textContent = content.nosotros.texto;

  const statsGrid = document.getElementById('stats-grid');
  content.nosotros.stats.forEach((s, i) => {
    const div = document.createElement('div');
    div.style.cssText = 'padding:40px 20px;text-align:center;' + (i < content.nosotros.stats.length-1 ? 'border-right:1px solid rgba(255,255,255,0.055);' : '');
    div.innerHTML = `
      <div style="font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;">${s.numero}<span style="color:#c9a86a;font-size:38px;">${s.sufijo}</span></div>
      <div style="font-size:13px;color:rgba(242,241,238,0.38);margin-top:8px;font-weight:500;">${s.label}</div>`;
    statsGrid.appendChild(div);
  });

  // ---------- SERVICIOS ----------
  document.getElementById('servicios-eyebrow').textContent = content.servicios.eyebrow;
  document.getElementById('servicios-titulo').textContent = content.servicios.titulo;
  document.getElementById('servicios-texto').textContent = content.servicios.texto;

  const servGrid = document.getElementById('servicios-grid');
  content.servicios.lista.forEach(s => {
    const div = document.createElement('div');
    div.style.cssText = 'background:#0f0f0e;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:32px 24px;transition:all .3s;';
    div.addEventListener('mouseover', () => { div.style.background='#141413'; div.style.borderColor='rgba(201,168,106,0.3)'; });
    div.addEventListener('mouseout', () => { div.style.background='#0f0f0e'; div.style.borderColor='rgba(255,255,255,0.06)'; });
    div.innerHTML = `
      <div style="font-size:10px;letter-spacing:2px;color:rgba(201,168,106,0.3);font-weight:700;margin-bottom:24px;">${s.numero}</div>
      <div style="width:34px;height:34px;border:1px solid rgba(201,168,106,0.35);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;">${ICONS[s.icono] || ICONS.search}</div>
      <h3 style="font-size:17px;font-weight:700;letter-spacing:-.2px;margin-bottom:10px;">${s.titulo}</h3>
      <p style="font-size:13px;line-height:1.7;color:rgba(242,241,238,0.45);">${s.texto}</p>`;
    servGrid.appendChild(div);
  });

  // ---------- INSPECCIÓN ----------
  document.getElementById('insp-eyebrow').innerHTML = '<span class="line"></span><span>' + content.inspeccion.eyebrow + '</span>';
  document.getElementById('insp-titulo1').textContent = content.inspeccion.titulo_linea1;
  document.getElementById('insp-titulo2').textContent = content.inspeccion.titulo_linea2;
  document.getElementById('insp-parrafo1').textContent = content.inspeccion.parrafo1;
  document.getElementById('insp-parrafo2').textContent = content.inspeccion.parrafo2;
  document.getElementById('insp-nota').textContent = content.inspeccion.nota;
  document.getElementById('insp-boton').href = waLink(waNumero, content.inspeccion.boton_mensaje_wa);
  document.getElementById('insp-boton-texto').textContent = content.inspeccion.boton;
  document.getElementById('insp-checklist-titulo').textContent = content.inspeccion.checklist_titulo;
  document.getElementById('insp-footer-nota').textContent = content.inspeccion.footer_nota;

  const checkSvg = '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#c9a86a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
  const checklistEl = document.getElementById('insp-checklist');
  content.inspeccion.checklist.forEach((item, i) => {
    const div = document.createElement('div');
    const isLast = i === content.inspeccion.checklist.length - 1 && content.inspeccion.checklist.length % 2 !== 0;
    div.style.cssText = 'display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;' + (isLast ? 'grid-column:1 / -1;' : '');
    div.innerHTML = `
      <div style="width:22px;height:22px;border-radius:50%;background:rgba(201,168,106,0.12);border:1px solid rgba(201,168,106,0.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${checkSvg}</div>
      <span style="font-size:13px;font-weight:600;line-height:1.35;">${item}</span>`;
    checklistEl.appendChild(div);
  });

  // ---------- STOCK ----------
  document.getElementById('stock-eyebrow').textContent = content.stock.eyebrow;
  document.getElementById('stock-titulo').textContent = content.stock.titulo;
  document.getElementById('stock-boton-ver-todo').textContent = content.stock.boton_ver_todo;
  document.getElementById('stock-boton-ver-todo').href = waLink(waNumero, content.stock.boton_ver_todo_mensaje_wa);

  const stockGrid = document.getElementById('stock-grid');
  stock.forEach(auto => {
    const reservado = auto.estado.toLowerCase() === 'reservado';
    const tagStyle = reservado
      ? 'background:rgba(201,168,106,0.12);border:1px solid rgba(201,168,106,0.38);color:#c9a86a;'
      : 'background:rgba(10,10,9,0.75);border:1px solid rgba(255,255,255,0.12);color:#f2f1ee;';
    const precioHTML = auto.precio
      ? `<div style="font-size:15px;color:#f2f1ee;font-weight:600;margin-bottom:20px;">${auto.precio}</div>`
      : `<div style="font-size:14px;color:rgba(242,241,238,0.38);font-style:italic;margin-bottom:20px;">Consultar precio</div>`;
    const mensaje = 'Hola! Quiero consultar por el ' + auto.marca_modelo + ' ' + auto.anio;

    const card = document.createElement('article');
    card.style.cssText = 'background:#0f0f0e;border:1px solid rgba(255,255,255,0.06);border-radius:18px;overflow:hidden;transition:all .3s cubic-bezier(.22,1,.36,1);';
    card.addEventListener('mouseover', () => { card.style.transform='translateY(-5px)'; card.style.borderColor='rgba(201,168,106,0.25)'; });
    card.addEventListener('mouseout', () => { card.style.transform='translateY(0)'; card.style.borderColor='rgba(255,255,255,0.06)'; });
    card.innerHTML = `
      <div style="position:relative;height:210px;overflow:hidden;background:#1a1a18;">
        <img src="${auto.foto}" alt="${auto.marca_modelo}" style="width:100%;height:100%;object-fit:cover;display:block;">
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(10,10,9,0.5) 100%);"></div>
        <div style="position:absolute;top:14px;left:14px;${tagStyle}backdrop-filter:blur(8px);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border-radius:100px;font-weight:600;">${auto.estado}</div>
      </div>
      <div style="padding:22px 24px 26px;">
        <div style="font-size:10px;letter-spacing:2px;color:#c9a86a;font-weight:700;margin-bottom:5px;text-transform:uppercase;">${auto.anio}</div>
        <h3 style="font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;">${auto.marca_modelo}</h3>
        ${precioHTML}
        <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
          <a href="${waLink(waNumero, mensaje)}" target="_blank" rel="noopener" class="stock-cta" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#f2f1ee;text-decoration:none;transition:color .2s;">Consultar por WA →</a>
        </div>
      </div>`;
    stockGrid.appendChild(card);
    const ctaLink = card.querySelector('.stock-cta');
    ctaLink.addEventListener('mouseover', () => ctaLink.style.color = '#c9a86a');
    ctaLink.addEventListener('mouseout', () => ctaLink.style.color = '#f2f1ee');
  });

  // ---------- CONTACTO ----------
  document.getElementById('contacto-eyebrow').textContent = content.contacto.eyebrow;
  document.getElementById('contacto-titulo').innerHTML = content.contacto.titulo.replace(' ', '<br>');
  document.getElementById('contacto-texto').textContent = content.contacto.texto;

  document.getElementById('contacto-wa').href = waLink(waNumero);
  document.getElementById('contacto-wa-numero').textContent = content.contacto.whatsapp.numero_visible;
  document.getElementById('contacto-ig').href = igUrl;
  document.getElementById('contacto-ig-usuario').textContent = content.contacto.instagram.usuario;
  document.getElementById('contacto-mapa-link').href = mapaSearchUrl;
  document.getElementById('contacto-direccion-corta').textContent = content.contacto.ubicacion.direccion_corta;
  document.getElementById('contacto-nombre-lugar').textContent = content.contacto.ubicacion.nombre_lugar;
  document.getElementById('contacto-direccion-completa').innerHTML = content.contacto.ubicacion.direccion_completa;
  document.getElementById('contacto-mapa-iframe').src = 'https://maps.google.com/maps?q=' + content.contacto.ubicacion.query_mapa + '&output=embed';

  document.querySelectorAll('#contacto-wa, #contacto-ig, #contacto-mapa-link').forEach(a => {
    a.addEventListener('mouseover', () => { a.style.borderColor='rgba(201,168,106,0.32)'; a.style.transform='translateX(5px)'; });
    a.addEventListener('mouseout', () => { a.style.borderColor='rgba(255,255,255,0.06)'; a.style.transform='translateX(0)'; });
  });

  // ---------- FOOTER ----------
  document.getElementById('footer-texto').textContent = content.footer.texto;

  // ---------- hide loader ----------
  const loader = document.getElementById('loading-msg');
  loader.style.opacity = '0';
  setTimeout(() => loader.remove(), 400);
}

init().catch(err => {
  console.error(err);
  const loader = document.getElementById('loading-msg');
  loader.textContent = 'Error cargando el contenido. Revisá la carpeta /data.';
});
</script>

</body>
</html>
